<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pierre Papier Ciseaux</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Pierre Papier Ciseaux</h1>

        <div class="score-board">
            <div>
                <h2>Joueur</h2>
                <p id="scoreJoueur">0</p>
            </div>

            <div>
                <h2>Ordinateur</h2>
                <p id="scoreOrdi">0</p>
            </div>
        </div>

        <h3>Manche : <span id="manche">0</span></h3>

        <div class="buttons">
            <button onclick="jouer('Pierre')">✊ Pierre</button>
            <button onclick="jouer('Papier')">✋ Papier</button>
            <button onclick="jouer('Ciseaux')">✌️ Ciseaux</button>
        </div>

        <div class="resultats">
            <p>Votre choix : <span id="choixJoueur">-</span></p>
            <p>Choix ordinateur : <span id="choixOrdi">-</span></p>
            <h2 id="resultat">Choisissez une option</h2>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
