<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Pierre Papier Ciseaux</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>Pierre Papier Ciseaux ✊📄✂️</h1>

        <div class="scores">

            <div class="box">
                <h2>Score</h2>
                <p id="score">0</p>
            </div>

            <div class="box">
                <h2>Manches</h2>
                <p id="manches">0</p>
            </div>

        </div>

        <div class="boutons">

            <button onclick="jouer('pierre')">
                ✊ Pierre
            </button>

            <button onclick="jouer('papier')">
                📄 Papier
            </button>

            <button onclick="jouer('ciseaux')">
                ✂️ Ciseaux
            </button>

        </div>

        <h2 id="resultat">
            Choisis une option
        </h2>

        <div id="choix">
            <p>Toi : <span id="joueurChoix">-</span></p>
            <p>Ordinateur : <span id="ordiChoix">-</span></p>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
